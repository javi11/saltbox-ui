services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: saltbox-ui-docker-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2375/_ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read-only access
      CONTAINERS: 1
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      SERVICES: 0
      TASKS: 0
      INFO: 1
      EVENTS: 1
      # Deny dangerous write operations
      POST: 1
      BUILD: 0
      COMMIT: 0
      EXEC: 0
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1
    networks:
      - saltbox-ui-internal

  saltbox-ui:
    image: ghcr.io/javi11/saltbox-ui:${CHANNEL:-latest}
    container_name: saltbox-ui
    restart: unless-stopped
    privileged: true
    pid: host
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/fstab:/host/fstab:ro
      - /srv/git/saltbox:/srv/git/saltbox:ro
      - /opt/saltbox_backup:/opt/saltbox_backup:ro
      - /opt/sandbox:/opt/sandbox:ro
      - saltbox-ui-audit:/var/log/saltbox-ui
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - ORIGIN=https://saltbox-ui.${DOMAIN}
      - TRAEFIK_API_URL=http://traefik:8080
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_FSTAB=/host/fstab
      # 'dev' = main branch builds, 'latest' (default) = stable releases.
      # Controls which GHCR image tag is pulled and which channel is shown in Settings.
      - CHANNEL=${CHANNEL:-latest}
      # GitHub repo used to fetch version info in Settings (optional).
      - GITHUB_REPO=${GITHUB_REPO:-javi11/saltbox-ui}
    networks:
      - saltbox
      - saltbox-ui-internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.saltbox-ui.rule=Host(`saltbox-ui.${DOMAIN}`)
      - traefik.http.routers.saltbox-ui.entrypoints=websecure
      - traefik.http.routers.saltbox-ui.tls=true
      - traefik.http.routers.saltbox-ui.tls.certresolver=cfdns
      - traefik.http.routers.saltbox-ui.middlewares=globalHeaders@file,secureHeaders@file,authelia@docker
      - traefik.http.services.saltbox-ui.loadbalancer.server.port=3000
      - traefik.http.routers.saltbox-ui-health.rule=Host(`saltbox-ui.${DOMAIN}`) && Path(`/health`)
      - traefik.http.routers.saltbox-ui-health.entrypoints=websecure
      - traefik.http.routers.saltbox-ui-health.tls=true
      - traefik.http.routers.saltbox-ui-health.tls.certresolver=cfdns
      - traefik.http.routers.saltbox-ui-health.middlewares=globalHeaders@file
      - traefik.http.routers.saltbox-ui-health.service=saltbox-ui
      - traefik.http.routers.saltbox-ui-health.priority=10
      - com.github.saltbox.saltbox_managed=true

volumes:
  saltbox-ui-audit:

networks:
  saltbox:
    external: true
  saltbox-ui-internal:
    internal: true
